name: reference-quality-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Verify Reference App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate search index
        run: npm run gen:search

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Check fact freshness
        run: npm run check:freshness

      - name: Check source links
        run: npm run check:links -- --strict

      - name: Build
        run: npm run build
