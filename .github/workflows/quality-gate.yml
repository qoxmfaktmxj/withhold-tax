name: reference-quality-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        # prebuild는 gen-search-index(검색 인덱스) + zod 스키마 검증을 겸함
        run: npm run build
